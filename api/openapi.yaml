openapi: 3.0.3
info:
  contact:
    email: support@hooksniff.vercel.app
    name: HookSniff Support
    url: https://hooksniff.vercel.app
  description: |
    Webhook delivery, monitoring, and management API.
    All endpoints under `/v1` require authentication via `Authorization: Bearer <api_key>` header
    unless marked as **Public**.
  license:
    name: Proprietary
  title: HookSniff API
  version: 1.0.0
servers:
- description: Production (Google Cloud Run)
  url: https://hooksniff-api-e6ztf3x2ma-ew.a.run.app/v1
- description: Local development
  url: http://localhost:3000/v1
security:
- BearerAuth: []
tags:
- description: "Registration, login, password reset, email verification, 2FA"
  name: Auth
- description: Manage webhook destination endpoints
  name: Endpoints
- description: Send and manage webhook deliveries
  name: Webhooks
- description: Manage API keys
  name: API Keys
- description: Alert rules and notifications
  name: Alerts
- description: "Delivery trends, success rates, latency metrics"
  name: Analytics
- description: Account usage statistics
  name: Stats
- description: Search webhook deliveries
  name: Search
- description: Receive webhooks from external providers
  name: Inbound
- description: In-app notification management
  name: Notifications
- description: Push notification device tokens
  name: Devices
- description: Team management and invitations
  name: Teams
- description: "Subscription, usage, invoices, payment webhooks"
  name: Billing
- description: Webhook payload templates
  name: Templates
- description: Manage service tokens for API access
  name: Service Tokens
- description: Webhook payload templates
  name: Applications
- description: JSON Schema registry and validation
  name: Schemas
- description: Smart routing configuration per endpoint
  name: Routing
- description: Test webhooks in sandbox
  name: Playground
- description: Payload transformation rules
  name: Transforms
- description: Real-time delivery event stream (SSE)
  name: Stream
- description: Admin-only user and system management
  name: Admin
- description: Contact form submission
  name: Contact
- description: Static IPs for firewall whitelisting
  name: Outbound IPs
- description: System health and status
  name: Health
- description: Self-service customer portal
  name: Customer Portal
- description: Detailed delivery and attempt info
  name: Delivery Details
- description: Audit trail for all account actions
  name: Audit Log
- description: Single Sign-On configuration (SAML/OIDC)
  name: SSO
- description: Custom domain management
  name: Custom Domains
- description: OAuth/SSO login providers
  name: OAuth
- description: Per-endpoint rate limiting
  name: Rate Limits
- description: Embeddable customer portal widget
  name: Embed
- description: Webhook simulator for testing
  name: Simulator
- description: Event type management
  name: Events
paths:
  /auth/register:
    post:
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerResponse"
          description: Account created
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Validation error
        "409":
          description: Email already exists
      security: []
      summary: Register a new account
      tags:
      - Auth
      x-content-type: application/json
      x-accepts:
      - application/json
  /auth/login:
    post:
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_auth_login_post_200_response"
          description: Login successful (or 2FA required)
        "401":
          description: Invalid credentials
      security: []
      summary: Login with email and password
      tags:
      - Auth
      x-content-type: application/json
      x-accepts:
      - application/json
  /auth/forgot-password:
    post:
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordRequest"
        required: true
      responses:
        "200":
          description: Reset email sent (if account exists)
      security: []
      summary: Request password reset email
      tags:
      - Auth
      x-content-type: application/json
      x-accepts:
      - application/json
  /auth/reset-password:
    post:
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordRequest"
        required: true
      responses:
        "200":
          description: Password reset successful
        "400":
          description: Invalid or expired token
      security: []
      summary: Reset password with token
      tags:
      - Auth
      x-content-type: application/json
      x-accepts:
      - application/json
  /auth/verify-email:
    post:
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyEmailRequest"
        required: true
      responses:
        "200":
          description: Email verified
        "400":
          description: Invalid token
      security: []
      summary: Verify email address
      tags:
      - Auth
      x-content-type: application/json
      x-accepts:
      - application/json
  /auth/resend-verification:
    post:
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResendVerificationRequest"
        required: true
      responses:
        "200":
          description: Verification email sent (if account exists and unverified)
      security: []
      summary: Resend verification email
      tags:
      - Auth
      x-content-type: application/json
      x-accepts:
      - application/json
  /auth/refresh:
    post:
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
          description: New tokens issued
        "401":
          description: Invalid refresh token
      security: []
      summary: Refresh access token
      tags:
      - Auth
      x-content-type: application/json
      x-accepts:
      - application/json
  /auth/2fa/verify:
    post:
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Verify2faRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
          description: "2FA verified, full token issued"
        "401":
          description: Invalid code
      security: []
      summary: Verify 2FA code during login
      tags:
      - Auth
      x-content-type: application/json
      x-accepts:
      - application/json
  /auth/me:
    get:
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerResponse"
          description: Current user
      summary: Get current user profile
      tags:
      - Auth
      x-accepts:
      - application/json
  /auth/profile:
    put:
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerResponse"
          description: Profile updated
      summary: Update profile
      tags:
      - Auth
      x-content-type: application/json
      x-accepts:
      - application/json
  /auth/password:
    put:
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
        required: true
      responses:
        "200":
          description: Password changed
        "400":
          description: Current password incorrect
      summary: Change password
      tags:
      - Auth
      x-content-type: application/json
      x-accepts:
      - application/json
  /auth/2fa/enable:
    post:
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Enable2faRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_auth_2fa_enable_post_200_response"
          description: TOTP secret generated
      summary: Enable 2FA (returns TOTP secret and QR URL)
      tags:
      - Auth
      x-content-type: application/json
      x-accepts:
      - application/json
  /auth/2fa/confirm:
    post:
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Confirm2faRequest"
        required: true
      responses:
        "200":
          description: 2FA enabled
        "400":
          description: Invalid code
      summary: Confirm 2FA setup with a code
      tags:
      - Auth
      x-content-type: application/json
      x-accepts:
      - application/json
  /auth/2fa/disable:
    post:
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Disable2faRequest"
        required: true
      responses:
        "200":
          description: 2FA disabled
        "400":
          description: Invalid password
      summary: Disable 2FA
      tags:
      - Auth
      x-content-type: application/json
      x-accepts:
      - application/json
  /endpoints:
    get:
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/Endpoint"
                type: array
          description: Endpoint list
      summary: List all endpoints
      tags:
      - Endpoints
      x-accepts:
      - application/json
    post:
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEndpointRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Endpoint"
          description: Endpoint created
      summary: Create a new endpoint
      tags:
      - Endpoints
      x-content-type: application/json
      x-accepts:
      - application/json
  /endpoints/{id}:
    delete:
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          $ref: "#/components/schemas/Uuid"
        style: simple
      responses:
        "200":
          description: Endpoint deleted
      summary: Delete endpoint
      tags:
      - Endpoints
      x-accepts:
      - application/json
    get:
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          $ref: "#/components/schemas/Uuid"
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Endpoint"
          description: Endpoint details
        "404":
          description: Not found
      summary: Get endpoint by ID
      tags:
      - Endpoints
      x-accepts:
      - application/json
    put:
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          $ref: "#/components/schemas/Uuid"
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEndpointRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Endpoint"
          description: Endpoint updated
      summary: Update endpoint
      tags:
      - Endpoints
      x-content-type: application/json
      x-accepts:
      - application/json
  /endpoints/{id}/rotate-secret:
    post:
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          $ref: "#/components/schemas/Uuid"
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_endpoints__id__rotate_secret_post_200_response"
          description: Secret rotated
      summary: Rotate endpoint signing secret
      tags:
      - Endpoints
      x-accepts:
      - application/json
  /endpoints/{id}/retry-policy:
    put:
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          $ref: "#/components/schemas/Uuid"
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RetryPolicy"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Endpoint"
          description: Retry policy updated
      summary: Update retry policy for an endpoint
      tags:
      - Endpoints
      x-content-type: application/json
      x-accepts:
      - application/json
  /webhooks:
    get:
      parameters:
      - explode: true
        in: query
        name: page
        required: false
        schema:
          default: 1
          type: integer
        style: form
      - explode: true
        in: query
        name: per_page
        required: false
        schema:
          default: 20
          type: integer
        style: form
      - explode: true
        in: query
        name: status
        required: false
        schema:
          enum:
          - pending
          - processing
          - delivered
          - failed
          type: string
        style: form
      - explode: true
        in: query
        name: endpoint_id
        required: false
        schema:
          $ref: "#/components/schemas/Uuid"
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeliveryListResponse"
          description: Paginated delivery list
      summary: List webhook deliveries
      tags:
      - Webhooks
      x-accepts:
      - application/json
    post:
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWebhookRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Delivery"
          description: Webhook queued
      summary: Send a webhook
      tags:
      - Webhooks
      x-content-type: application/json
      x-accepts:
      - application/json
  /webhooks/batch:
    post:
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchWebhookRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchResponse"
          description: Batch processed
      summary: Send multiple webhooks in batch
      tags:
      - Webhooks
      x-content-type: application/json
      x-accepts:
      - application/json
  /webhooks/batch/replay:
    post:
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchReplayRequest"
        required: true
      responses:
        "200":
          description: Batch replay initiated
      summary: Replay multiple deliveries by ID
      tags:
      - Webhooks
      x-content-type: application/json
      x-accepts:
      - application/json
  /webhooks/export:
    get:
      parameters:
      - explode: true
        in: query
        name: range
        required: false
        schema:
          default: 7d
          enum:
          - 24h
          - 7d
          - 30d
          type: string
        style: form
      responses:
        "200":
          content:
            text/csv:
              schema:
                type: string
          description: CSV file
      summary: Export deliveries as CSV
      tags:
      - Webhooks
      x-accepts:
      - text/csv
  /webhooks/{id}:
    get:
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          $ref: "#/components/schemas/Uuid"
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Delivery"
          description: Delivery details
      summary: Get delivery by ID
      tags:
      - Webhooks
      x-accepts:
      - application/json
  /webhooks/{id}/replay:
    post:
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          $ref: "#/components/schemas/Uuid"
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Delivery"
          description: Replay initiated
      summary: Replay a single delivery
      tags:
      - Webhooks
      x-accepts:
      - application/json
  /webhooks/{id}/attempts:
    get:
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          $ref: "#/components/schemas/Uuid"
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/DeliveryAttempt"
                type: array
          description: Attempt list
      summary: Get delivery attempts
      tags:
      - Webhooks
      x-accepts:
      - application/json
  /webhooks/{id}/details:
    get:
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          $ref: "#/components/schemas/Uuid"
        style: simple
      responses:
        "200":
          description: Full delivery details
      summary: Get detailed delivery info
      tags:
      - Delivery Details
      x-accepts:
      - application/json
  /webhooks/{id}/attempts/{attempt_id}:
    get:
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          $ref: "#/components/schemas/Uuid"
        style: simple
      - explode: false
        in: path
        name: attempt_id
        required: true
        schema:
          $ref: "#/components/schemas/Uuid"
        style: simple
      responses:
        "200":
          description: Attempt details
      summary: Get specific attempt detail
      tags:
      - Delivery Details
      x-accepts:
      - application/json
  /api-keys:
    get:
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/ApiKeyInfo"
                type: array
          description: API key list
      summary: List API keys
      tags:
      - API Keys
      x-accepts:
      - application/json
    post:
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateApiKeyResponse"
          description: API key created
      summary: Create a new API key
      tags:
      - API Keys
      x-accepts:
      - application/json
  /api-keys/{id}:
    delete:
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          $ref: "#/components/schemas/Uuid"
        style: simple
      responses:
        "200":
          description: API key revoked
      summary: Delete (revoke) an API key
      tags:
      - API Keys
      x-accepts:
      - application/json
  /api-keys/{id}/rotate:
    post:
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          $ref: "#/components/schemas/Uuid"
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateApiKeyResponse"
          description: New key generated
      summary: Rotate an API key
      tags:
      - API Keys
      x-accepts:
      - application/json
  /alerts:
    get:
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/AlertRule"
                type: array
          description: Alert list
      summary: List alert rules
      tags:
      - Alerts
      x-accepts:
      - application/json
    post:
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAlertRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlertRule"
          description: Alert created
      summary: Create alert rule
      tags:
      - Alerts
      x-content-type: application/json
      x-accepts:
      - application/json
  /alerts/{id}:
    delete:
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          $ref: "#/components/schemas/Uuid"
        style: simple
      responses:
        "200":
          description: Alert deleted
      summary: Delete alert rule
      tags:
      - Alerts
      x-accepts:
      - application/json
    get:
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          $ref: "#/components/schemas/Uuid"
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlertRule"
          description: Alert details
      summary: Get alert rule
      tags:
      - Alerts
      x-accepts:
      - application/json
  /alerts/{id}/test:
    post:
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          $ref: "#/components/schemas/Uuid"
        style: simple
      responses:
        "200":
          description: Test notification sent
      summary: Test an alert rule
      tags:
      - Alerts
      x-accepts:
      - application/json
  /analytics/deliveries:
    get:
      parameters:
      - explode: true
        in: query
        name: range
        required: false
        schema:
          default: 24h
          enum:
          - 24h
          - 7d
          - 30d
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeliveryTrendResponse"
          description: Delivery trend data
      summary: Delivery trend over time
      tags:
      - Analytics
      x-accepts:
      - application/json
  /analytics/success-rate:
    get:
      parameters:
      - explode: true
        in: query
        name: range
        required: false
        schema:
          default: 24h
          enum:
          - 24h
          - 7d
          - 30d
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessRateResponse"
          description: Success rate data
      summary: Success rate metrics
      tags:
      - Analytics
      x-accepts:
      - application/json
  /analytics/latency:
    get:
      parameters:
      - explode: true
        in: query
        name: range
        required: false
        schema:
          default: 24h
          enum:
          - 24h
          - 7d
          - 30d
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LatencyTrendResponse"
          description: Latency trend data
      summary: Latency trend over time
      tags:
      - Analytics
      x-accepts:
      - application/json
  /stats:
    get:
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsResponse"
          description: Account stats
      summary: Get account statistics
      tags:
      - Stats
      x-accepts:
      - application/json
  /search:
    get:
      parameters:
      - explode: true
        in: query
        name: q
        required: true
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: status
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: endpoint_id
        required: false
        schema:
          $ref: "#/components/schemas/Uuid"
        style: form
      - explode: true
        in: query
        name: page
        required: false
        schema:
          type: integer
        style: form
      - explode: true
        in: query
        name: per_page
        required: false
        schema:
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResult"
          description: Search results
      summary: Search deliveries
      tags:
      - Search
      x-accepts:
      - application/json
  /inbound/{provider}:
    post:
      description: |
        Accepts webhooks from external providers (Stripe, GitHub, etc.)
        and routes them to the customer's endpoints.
      parameters:
      - explode: false
        in: path
        name: provider
        required: true
        schema:
          description: "Provider name (e.g. \"stripe\", \"github\")"
          type: string
